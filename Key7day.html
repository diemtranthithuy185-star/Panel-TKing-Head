<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Tking Head Admin 7 Day</title>

<style>

body{
background:black;
color:#00ffd5;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
padding:40px;
border-radius:25px;
box-shadow:0 0 40px #00ffd5;
text-align:center;
width:320px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#00ffd5;
font-weight:bold;
margin-top:15px;
}

#result{
margin-top:20px;
}

</style>

</head>

<body>

<div class="box">

<h2>Nhập Key Admin 7 Day</h2>

<input id="key7" placeholder="Ví dụ: TKING-7DAY-1234">

<button onclick="save7()">Lưu Key</button>

<div id="result"></div>

</div>

<script>

function save7(){

let key=document.getElementById("key7").value

if(key==""){

result.innerText="Chưa nhập key"

return

}

let list=JSON.parse(localStorage.getItem("KEYS_7DAY")||"[]")

list.push(key)

localStorage.setItem("KEYS_7DAY",JSON.stringify(list))

let exp=new Date()

exp.setDate(exp.getDate()+7)

navigator.clipboard.writeText(key)

result.innerText="Đã lưu key 7 ngày: "+key+"\nHết hạn: "+exp.toLocaleString()

}

</script>

</body>
</html>
