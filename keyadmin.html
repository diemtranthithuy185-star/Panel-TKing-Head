<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Tking Head Admin VIP</title>

<style>

body{
background:black;
color:#00ffd5;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
padding:40px;
border-radius:25px;
box-shadow:0 0 40px #00ffd5;
text-align:center;
width:320px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#00ffd5;
font-weight:bold;
margin-top:15px;
}

#result{
margin-top:20px;
}

</style>

</head>

<body>

<div class="box">

<h2>Nhập Key Admin VIP</h2>

<input id="vipkey" placeholder="Ví dụ: TKING-ADMIN-9999">

<button onclick="saveVIP()">Lưu Key</button>

<div id="result"></div>

</div>

<script>

function saveVIP(){

let key=document.getElementById("vipkey").value

if(key==""){

result.innerText="Chưa nhập key"

return

}

let list=JSON.parse(localStorage.getItem("ADMIN_KEYS")||"[]")

list.push(key)

localStorage.setItem("ADMIN_KEYS",JSON.stringify(list))

navigator.clipboard.writeText(key)

result.innerText="Đã lưu key VIP: "+key

}

</script>

</body>
</html>
