<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tking Head Panel</title>

<style>

body{
background:black;
font-family:Arial;
color:white;
text-align:center;
}

.box{
margin-top:80px;
}

input{
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:12px;
background:#00ffcc;
color:black;
font-weight:bold;
}

.panel{
display:none;
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#00ffcc;
color:black;
padding:10px;
border-radius:10px;
opacity:0;
transition:0.5s;
}

</style>

</head>

<body>

<div id="toast" class="toast"></div>

<div class="box" id="loginBox">

<h2>Tking Head Panel</h2>

<input id="keyInput" placeholder="Nhập key">

<br><br>

<button onclick="login()">Đăng nhập</button>

<br>

<button onclick="getKey()">GetKey 24h</button>

<p id="expire"></p>

</div>


<div class="panel" id="panel">

<h3 id="device"></h3>

<button onclick="notify('Aimlock bật')">Aimlock</button>

<button onclick="notify('Nhẹ tâm bật')">Nhẹ tâm</button>

<button onclick="notify('Nhạy tâm bật')">Nhạy tâm</button>

<button onclick="notify('Aimlock Head bật')">Aimlock Head</button>

<button onclick="notify('Aim cổ nhẹ bật')">Aim cổ nhẹ</button>

<button onclick="notify('Fix lag bật')">Fix lag</button>

<button onclick="notify('Fix rung bật')">Fix rung</button>

<button onclick="notify('Fix lố bật')">Fix lố</button>

<button onclick="notify('Anti check bật')">Anti check</button>

<button onclick="notify('Antiband bật')">Antiband</button>

</div>


<script>

const KEY_URL="https://raw.githubusercontent.com/diemtranthithuy185-star/Panel-TKing-Head/main/keys.json";


function login(){

let key=document.getElementById("keyInput").value;

fetch(KEY_URL)

.then(res=>res.json())

.then(data=>{

if(data.vip.includes(key)){

startPanel("VIP");

return;

}

if(data.day7.includes(key)){

let exp=new Date();

exp.setDate(exp.getDate()+7);

startPanel(exp.toLocaleString());

return;

}

let saved=localStorage.getItem("key24");

if(saved==key){

startPanel("24 giờ");

return;

}

notify("Sai key");

})

}


function startPanel(time){

document.getElementById("loginBox").style.display="none";

document.getElementById("panel").style.display="block";

document.getElementById("device").innerText=

"Device: TK"+Math.floor(Math.random()*999999999);

document.getElementById("expire").innerText=

"Hết hạn: "+time;

notify("Đăng nhập thành công");

}


function notify(text){

let t=document.getElementById("toast");

t.innerText=text;

t.style.opacity=1;

setTimeout(()=>{

t.style.opacity=0;

},2000);

}


function getKey(){

let last=localStorage.getItem("lastGet");

let now=Date.now();

if(last && now-last<3*24*60*60*1000){

notify("3 ngày sau quay lại");

return;

}

let key="TKING-Mod-"+Math.floor(Math.random()*9999);

localStorage.setItem("key24",key);

localStorage.setItem("lastGet",now);

navigator.clipboard.writeText(key);

notify("Key đã copy");

}

</script>

</body>
</html>
