<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel TKing Mod</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }
    input, button {
        padding: 10px;
        margin: 5px;
        border-radius: 5px;
        border: none;
    }
    input { width: 250px; }
    button { cursor: pointer; background: #28a745; color: #fff; }
    #panel { display: none; margin-top: 20px; }
</style>
</head>
<body>

<h2>Đăng nhập Panel TKing</h2>
<input type="text" id="keyInput" placeholder="Nhập key của bạn">
<button onclick="login()">Đăng nhập</button>

<div id="panel">
    <h3>Chào mừng bạn đã vào panel!</h3>
    <p id="keyInfo"></p>
    <button onclick="getKey()">Get Key</button>
</div>

<script>
// ==== CONFIG ====
const ADMIN_KEY = "TKING-VIP49ANFQ"; // key vĩnh viễn
const KEY_7DAY = "TKING-7DAY1234";    // key 7 ngày
let expireDate = new Date();
expireDate.setDate(expireDate.getDate() + 7); // key 7 ngày hôm nay + 7 ngày

// ==== LOGIN FUNCTION ====
function login() {
    let input = document.getElementById("keyInput").value.trim();
    
    // check Admin Key
    if(input === ADMIN_KEY) {
        showPanel("Admin Key - Vĩnh viễn");
        return;
    }
    
    // check 7-day Key
    if(input === KEY_7DAY) {
        let now = new Date();
        if(now > expireDate) {
            alert("Key 7 ngày đã hết hạn!");
            return;
        }
        showPanel("Key 7 ngày còn hạn đến: " + expireDate.toLocaleDateString());
        return;
    }

    // sai key
    alert("Sai key!");
}

// ==== SHOW PANEL ====
function showPanel(info) {
    document.getElementById("panel").style.display = "block";
    document.getElementById("keyInfo").innerText = info;
}

// ==== GET KEY FUNCTION ====
function getKey() {
    let input = document.getElementById("keyInput").value.trim();
    let keyToCopy = "";
    
    if(input === ADMIN_KEY) keyToCopy = ADMIN_KEY;
    else if(input === KEY_7DAY) keyToCopy = KEY_7DAY;
    else {
        alert("Không có key hợp lệ để copy!");
        return;
    }

    navigator.clipboard.writeText(keyToCopy).then(() => {
        alert("Key đã được copy: " + keyToCopy);
    });
}
</script>

</body>
</html>
.panel{
display:none;
}

.toast{
position:fixed;
top:20px;
right:20px;
background:#00ffcc;
color:black;
padding:10px;
border-radius:10px;
opacity:0;
transition:0.5s;
}

</style>

</head>

<body>

<div id="toast" class="toast"></div>

<div class="box" id="loginBox">

<h2>Tking Head Panel</h2>

<input id="keyInput" placeholder="Nhập key">

<br><br>

<button onclick="login()">Đăng nhập</button>

<br>

<button onclick="getKey()">GetKey 24h</button>

<p id="expire"></p>

</div>


<div class="panel" id="panel">

<h3 id="device"></h3>

<button onclick="notify('Aimlock bật')">Aimlock</button>

<button onclick="notify('Nhẹ tâm bật')">Nhẹ tâm</button>

<button onclick="notify('Nhạy tâm bật')">Nhạy tâm</button>

<button onclick="notify('Aimlock Head bật')">Aimlock Head</button>

<button onclick="notify('Aim cổ nhẹ bật')">Aim cổ nhẹ</button>

<button onclick="notify('Fix lag bật')">Fix lag</button>

<button onclick="notify('Fix rung bật')">Fix rung</button>

<button onclick="notify('Fix lố bật')">Fix lố</button>

<button onclick="notify('Anti check bật')">Anti check</button>

<button onclick="notify('Antiband bật')">Antiband</button>

</div>


<script>

const KEY_URL="https://raw.githubusercontent.com/diemtranthithuy185-star/Panel-TKing-Head/main/keys.json";


function login(){

let key=document.getElementById("keyInput").value;

fetch(KEY_URL)

.then(res=>res.json())

.then(data=>{

if(data.vip.includes(key)){

startPanel("VIP");

return;

}

if(data.day7.includes(key)){

let exp=new Date();

exp.setDate(exp.getDate()+7);

startPanel(exp.toLocaleString());

return;

}

let saved=localStorage.getItem("key24");

if(saved==key){

startPanel("24 giờ");

return;

}

notify("Sai key");

})

}


function startPanel(time){

document.getElementById("loginBox").style.display="none";

document.getElementById("panel").style.display="block";

document.getElementById("device").innerText=

"Device: TK"+Math.floor(Math.random()*999999999);

document.getElementById("expire").innerText=

"Hết hạn: "+time;

notify("Đăng nhập thành công");

}


function notify(text){

let t=document.getElementById("toast");

t.innerText=text;

t.style.opacity=1;

setTimeout(()=>{

t.style.opacity=0;

},2000);

}


function getKey(){

let last=localStorage.getItem("lastGet");

let now=Date.now();

if(last && now-last<3*24*60*60*1000){

notify("3 ngày sau quay lại");

return;

}

let key="TKING-Mod-"+Math.floor(Math.random()*9999);

localStorage.setItem("key24",key);

localStorage.setItem("lastGet",now);

navigator.clipboard.writeText(key);

notify("Key đã copy");

}

</script>

</body>
</html>
